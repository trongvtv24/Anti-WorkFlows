name: Validate AWF

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run validator unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate AWF metadata and artifacts
        run: python tools/validate_awf.py --strict

  audit_workflow_skill_logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Audit workflow-skill logic contracts
        run: python tools/audit_workflow_skill_logic.py --strict
